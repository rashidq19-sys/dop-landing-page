[phases.setup]
nixPkgs = ["nodejs_22"]

[variables]
# Skip Puppeteer's Chrome download during `npm install` on Railway.
# Puppeteer is only needed locally for prerendering — the per-route HTML
# in dist/public/ is committed to git and shipped as-is. Without this,
# every Railway build wastes minutes downloading a ~200 MB Chrome that
# the runtime never uses.
PUPPETEER_SKIP_DOWNLOAD = "true"

[phases.install]
cmds = ["npm install --legacy-peer-deps"]

[phases.build]
# Railway only bundles the server with esbuild. Vite build + prerender
# happen locally before pushing — see `npm run build` and commit the
# resulting dist/public/ directory.
cmds = ["npm run build:server"]

[start]
cmd = "NODE_ENV=production node dist/index.js"
