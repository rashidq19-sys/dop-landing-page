[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
# PUPPETEER_SKIP_DOWNLOAD prepended directly because Nixpacks's [variables]
# block doesn't reliably propagate to phase commands on Railway. Without it
# `npm install` runs puppeteer's postinstall which tries to download Chrome,
# then fails extracting the archive because unzip isn't on PATH. Puppeteer
# is only needed locally for prerendering — the per-route HTML in
# dist/public/ is committed to git and shipped as-is, so the runtime never
# needs Chrome.
cmds = ["PUPPETEER_SKIP_DOWNLOAD=true npm install --legacy-peer-deps"]

[phases.build]
# Railway only bundles the server with esbuild. Vite build + prerender
# happen locally before pushing — see `npm run build` and commit the
# resulting dist/public/ directory.
cmds = ["npm run build:server"]

[start]
cmd = "NODE_ENV=production node dist/index.js"
